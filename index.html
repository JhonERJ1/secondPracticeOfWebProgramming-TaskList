<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="node_modules/normalize.css/normalize.css">
  <link rel="stylesheet" href="style.css">
  <title>TaskList - Lista de tareas</title>
</head>
<body>
  <header class="header">
    <h1>TaskList - Gestionador de tareas</h1>
    <p>Se acabo el desorden, es hora de ponerle orden a las cosas que si importan</p>
  </header>
  <main class="main">
    <form action="">
      <div>
        <label for="TaskName">Nombre de la tarea</label>
        <input id="TaskName" type="text" placeholder="Ej. Creacion de boton" required>
        <p id="TaskError" class="error"></p>
      </div>
      <div>
        <label for="TaskDescription">Descripcion</label>
        <input id="TaskDescription" type="text" placeholder="Descripcion de la tarea">
      </div>
      <input type="submit" value="Agregar" class="btnTask">
    </form>
    <p>Tareas</p>
    <ul class="TaskList">
    </ul>
  </main>
  <footer class="footer">

    <p>Todos los derechos reservados 2026 </p>
  </footer>
  <script type="module" src="script.js"></script>
</body>
</html>
