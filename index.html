<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskList</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <h1>TaskList</h1>
  <p>Organiza tus tareas de forma simple y efectiva</p>
</header>

<main class="main">
  <div class="filters">
    <button id="filterAll">Todas</button>
    <button id="filterPending">Pendientes</button>
    <button id="filterCompleted">Completadas</button>
  </div>

  <form id="taskForm">
    <div>
      <label for="taskName">Nombre de la tarea</label>
      <input type="text" id="taskName" placeholder="Ej. Crear botón">
      <p class="error" id="taskError"></p>
    </div>

    <div>
      <label for="taskDescription">Descripción</label>
      <input type="text" id="taskDescription" placeholder="Opcional">
    </div>

    <button type="submit" class="btnTask">Agregar tarea</button>
  </form>

  <ul class="TaskList"></ul>

  <button id="clearAll" class="clear">Limpiar todo</button>
</main>

<script src="script.js"></script>
</body>
</html>
